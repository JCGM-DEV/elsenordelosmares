<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Señor de los Mares - Conversational Adventure</title>
    <link rel="manifest" href="./manifest.json" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(r => console.log('SW Registrado'))
            .catch(e => console.error('SW Falló', e));
        });
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div id="loading-failsafe" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:#c5a021; text-align:center; padding:20px; font-family:serif;">
        <p>Cargando memoria de una epopeya...</p>
        <div id="failsafe-helper" class="hidden" style="margin-top:2rem;">
            <p style="color:#ff4444; margin-bottom:1rem;">Si la pantalla sigue en blanco, intenta lo siguiente:</p>
            <button onclick="window.location.reload(true)" style="background:#c5a021; color:#000; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">FORZAR RECARGA</button>
            <p style="font-size:0.8rem; margin-top:1rem; opacity:0.7;">Asegúrate de que la URL termine con una barra /</p>
        </div>
      </div>
    </div>
    <script>
      // Failsafe: if engine doesn't start in 4 seconds, show helper
      setTimeout(() => {
        const failsafe = document.getElementById('failsafe-helper');
        if (document.getElementById('app').children.length <= 1 && failsafe) {
          failsafe.classList.remove('hidden');
        }
      }, 4000);
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
