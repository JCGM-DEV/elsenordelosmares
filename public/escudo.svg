<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
    <defs>
        <clipPath id="shield-clip">
            <path d="M 10 10 L 90 10 L 90 70 Q 90 110 50 110 Q 10 110 10 70 Z" />
        </clipPath>
        <pattern id="checkers" x="10" y="10" width="32" height="32" patternUnits="userSpaceOnUse">
            <rect x="0" y="0" width="16" height="16" fill="#111" />
            <rect x="16" y="0" width="16" height="16" fill="#eee" />
            <rect x="0" y="16" width="16" height="16" fill="#eee" />
            <rect x="16" y="16" width="16" height="16" fill="#111" />
        </pattern>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700" />
            <stop offset="50%" stop-color="#DAA520" />
            <stop offset="100%" stop-color="#B8860B" />
        </linearGradient>
    </defs>

    <!-- Fondo de ajedrezado -->
    <rect x="0" y="0" width="100" height="120" fill="url(#checkers)" clip-path="url(#shield-clip)" />

    <!-- Bordura interior (cruz) indicando linaje noble -->
    <path d="M 10 10 L 90 10 L 90 70 Q 90 110 50 110 Q 10 110 10 70 Z" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="6"/>

    <!-- Bordura dorada del escudo -->
    <path d="M 10 10 L 90 10 L 90 70 Q 90 110 50 110 Q 10 110 10 70 Z" fill="none" stroke="url(#gold)" stroke-width="4"/>
    
    <!-- Adornos superiores del escudo de armas -->
    <path d="M 20 10 L 10 0 L 90 0 L 80 10 Z" fill="url(#gold)" />
</svg>
